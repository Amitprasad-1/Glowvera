spring.application.name=glowvera

# Database Connection Settings
spring.datasource.url=jdbc:mysql://localhost:3306/glowvera_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=system
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Settings
server.port=8080

# Security and JWT config (Secret must be at least 256 bits / 64 hex chars)
glowvera.jwt.secret=9a4f2c8d3b7a5e1f6c8d9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d
glowvera.jwt.expiration=86400000

# Cache type configuration (memory or redis)
glowvera.cache.type=memory
