<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Glowvera - Premium Unisex Salon & Spa</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Experience premium unisex styling, beard grooming, skincare facials, and relaxing spa massages at Glowvera. Book your scheduling slots online.">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="icon" type="image/png" href="glowvera_logo.png">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <app-root></app-root>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('Service Worker registered successfully!', reg))
          .catch(err => console.error('Service Worker registration failed:', err));
      });
    }
  </script>
</body>
</html>
