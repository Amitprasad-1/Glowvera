<header class="navbar glass">
  <div class="navbar-container">
    <a routerLink="/home" class="logo">
      <span class="logo-main"><span class="gold-text">✨ GLOW</span>VERA</span>
      <span class="sub-logo">LUXURY UNISEX SALON</span>
    </a>
    <nav class="nav-links">
      <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">Home</a>
      <a routerLink="/booking" routerLinkActive="active" class="nav-link">Book Now</a>
      
      @if (auth.isAdmin()) {
        <a routerLink="/admin" routerLinkActive="active" class="nav-link admin-link">💎 Admin Dashboard</a>
      }
      
      @if (auth.isAuthenticated()) {
        <span class="user-greeting">Welcome, <span class="greeting-name">{{ auth.currentUserSignal()?.name }}</span></span>
        <button (click)="logout()" class="btn btn-secondary btn-sm">Logout</button>
      } @else {
        <a routerLink="/auth" class="btn btn-primary btn-sm btn-signin">Sign In</a>
      }
    </nav>
  </div>
</header>

<main class="main-content">
  <router-outlet></router-outlet>
</main>

<footer class="footer">
  <div class="footer-container container">
    <div class="footer-divider"></div>
    <div class="footer-row">
      <span class="footer-brand"><span class="gold-text">GLOW</span>VERA</span>
      <p class="footer-copy">&copy; 2026 GLOWVERA. Confidence. Your Best Look. All Rights Reserved.</p>
      <span class="footer-tag">PREMIUM SCHEDULING PLATFORM</span>
    </div>
  </div>
</footer>
